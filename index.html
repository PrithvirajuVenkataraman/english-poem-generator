<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Poem Generator</title>
  <style>
    :root {
      --bg: #0b0c10;
      --panel: #14161c;
      --panel-2: #1d2028;
      --line: #2a2d34;
      --text: #f7f3ea;
      --muted: #b8b3aa;
      --gold: #d7b56d;
      --gold-light: #efcb7e;
      --danger: #e26d6d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 42px;
    }

    .top-action {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 22px;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 0.68rem;
      font-weight: 850;
      letter-spacing: 0.12rem;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.04;
      margin: 0;
      letter-spacing: 0;
      text-align: center;
    }

    .hero-copy {
      color: var(--muted);
      max-width: 620px;
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 14px auto 22px;
      text-align: center;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 20px;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.25);
    }

    h2 {
      margin: 0 0 16px;
      font-size: 1.2rem;
    }

    label {
      display: block;
      font-weight: 750;
      margin-bottom: 7px;
      font-size: 0.88rem;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid #30343f;
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      outline: none;
    }

    textarea {
      min-height: 145px;
      resize: vertical;
      padding: 13px;
      line-height: 1.5;
    }

    .prompt-area {
      position: relative;
    }

    .prompt-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
    }

    .prompt-status {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.4;
      min-height: 20px;
    }

    .prompt-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .prompt-button {
      min-height: 36px;
      padding: 0 12px;
      font-size: 0.84rem;
      white-space: nowrap;
    }

    .prompt-button.is-listening {
      border-color: var(--gold);
      background: #2a2418;
      color: var(--gold-light);
    }

    input {
      height: 44px;
      padding: 0 12px;
    }

    select {
      height: 44px;
      padding: 0 12px;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(215, 181, 109, 0.16);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 16px 0;
    }

    button {
      border-radius: 8px;
      min-height: 44px;
      padding: 0 15px;
      font: inherit;
      font-weight: 800;
      font-size: 0.92rem;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }

    .primary {
      width: 100%;
      border: 1px solid var(--gold);
      background: var(--gold);
      color: #101010;
      box-shadow: 0 10px 28px rgba(215, 181, 109, 0.18);
    }

    .submit-button {
      margin-top: 18px;
    }

    .secondary {
      border: 1px solid #4b5160;
      background: #181b22;
      color: var(--text);
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary:hover {
      background: var(--gold-light);
      border-color: var(--gold-light);
    }

    .secondary:hover {
      border-color: var(--gold);
      background: #20242d;
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
      transform: none;
    }

    .loader {
      display: none;
      border: 1px solid #3a3120;
      border-radius: 8px;
      padding: 12px;
      background: #17130c;
      color: #f3d390;
      margin-top: 18px;
    }

    .bar {
      height: 8px;
      background: #2a2418;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 12px;
    }

    .bar span {
      display: block;
      width: 12%;
      height: 100%;
      background: var(--gold);
      border-radius: inherit;
      transition: width 500ms ease;
    }

    .result,
    .history-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 18px;
      margin-top: 18px;
    }

    .result-header,
    .history-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
    }

    .history-title {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text);
      min-height: auto;
      padding: 0;
      text-align: left;
      font-size: 1.1rem;
      font-weight: 850;
      width: auto;
    }

    .history-title:hover {
      color: var(--gold);
      transform: none;
    }

    .copy-button {
      min-height: 36px;
      white-space: nowrap;
    }

    .result-actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .poem {
      white-space: pre-wrap;
      line-height: 1.85;
      font-size: 0.96rem;
      color: #f8f0df;
    }

    .poem-editor {
      min-height: 260px;
      white-space: pre-wrap;
    }

    .byline {
      color: var(--gold);
      font-size: 0.94rem;
      font-weight: 750;
      margin: 8px 0 14px;
    }

    .prompt-label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      margin: 14px 0 6px;
      text-transform: uppercase;
    }

    .prompt-text {
      border-left: 3px solid var(--gold);
      color: var(--text);
      line-height: 1.55;
      margin-bottom: 14px;
      padding-left: 12px;
    }

    .meta {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 14px;
    }

    .history-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin: 14px 0;
    }

    .hidden {
      display: none;
    }

    .expanded {
      display: block;
    }

    .error {
      border: 1px solid rgba(226, 109, 109, 0.55);
      border-radius: 8px;
      background: rgba(226, 109, 109, 0.12);
      color: #ffd0d0;
      padding: 14px;
      margin-top: 16px;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 24px, 1040px);
        padding-top: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .panel,
      .result,
      .history-item {
        padding: 18px;
      }

      button {
        width: 100%;
      }

      .history-actions {
        display: block;
      }

      .history-actions button {
        margin-top: 12px;
      }

      .prompt-toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .prompt-buttons {
        justify-content: stretch;
      }

      .prompt-button {
        flex: 1 1 120px;
      }

      .result-header,
      .history-title-row {
        display: block;
      }

      .copy-button {
        margin-top: 12px;
      }

      .result-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section id="createView">
      <div class="top-action">
        <button class="secondary" id="historyButton" type="button">View History</button>
      </div>

      <h1>Poem Generator</h1>
      <p class="hero-copy">Turn a memory, conflict, scene, or feeling into a composed English poem with a clear emotional voice.</p>

      <form class="panel" id="poemForm">
        <h2>Compose</h2>

        <div class="prompt-area">
          <label for="situation">Situation or Emotional Prompt</label>
          <textarea id="situation" placeholder="Example: A person waits at a quiet bus stop on a rainy night, remembering a love they never confessed."></textarea>
          <div class="prompt-toolbar">
            <div class="prompt-status" id="voiceStatus">Type your prompt, or use voice-to-text.</div>
            <div class="prompt-buttons">
              <button class="secondary prompt-button" id="voiceButton" type="button">Start VTT</button>
              <button class="secondary prompt-button" id="clearPromptButton" type="button">Clear Prompt</button>
            </div>
          </div>
        </div>

        <div class="grid">
          <div>
            <label for="emotion">Emotion</label>
            <select id="emotion">
              <option>Love</option>
              <option>Longing</option>
              <option>Heartbreak</option>
              <option>Anger</option>
              <option>Peace</option>
              <option>Closure</option>
              <option>Hope</option>
              <option>Haunting</option>
            </select>
          </div>

          <div>
            <label for="style">Style</label>
            <select id="style">
              <option>Simple English</option>
              <option>Modern Poetic</option>
              <option>Classical Poetic</option>
              <option>Dark Poetic</option>
              <option>Cinematic</option>
            </select>
          </div>
        </div>

        <div class="grid">
          <div>
            <label for="poemLength">Poem Length</label>
            <select id="poemLength">
              <option>Short</option>
              <option selected>Medium</option>
              <option>Long</option>
            </select>
          </div>

          <div>
            <label for="tone">Tone</label>
            <select id="tone">
              <option>Soft</option>
              <option>Dramatic</option>
              <option>Hopeful</option>
              <option>Melancholic</option>
              <option>Romantic</option>
            </select>
          </div>
        </div>

        <label for="authorName">Pen Name</label>
        <input id="authorName" maxlength="80" placeholder="Example: A. River" type="text">

        <button class="primary submit-button" id="generateButton" type="submit">Generate Poem</button>
        <div class="loader" id="loader">
          <div id="loaderText">Reading the emotional weather...</div>
          <div class="bar"><span id="loaderBar"></span></div>
        </div>
        <div id="errorBox"></div>
      </form>

      <div id="result"></div>
    </section>

    <section id="historyView" class="hidden">
      <div class="top-action">
        <button class="secondary" id="backButton" type="button">Back to Generator</button>
      </div>

      <div class="eyebrow">Saved work</div>
      <h1>Poem History</h1>
      <p class="hero-copy">Review, revisit, or remove poems from previous sessions.</p>

      <div class="history-actions">
        <div id="historyCount"></div>
        <button class="secondary" id="clearHistoryButton" type="button">Clear All History</button>
      </div>

      <div id="historyList"></div>
    </section>
  </main>

  <script>
    const historyButton = document.getElementById("historyButton");
    const backButton = document.getElementById("backButton");
    const createView = document.getElementById("createView");
    const historyView = document.getElementById("historyView");
    const poemForm = document.getElementById("poemForm");
    const generateButton = document.getElementById("generateButton");
    const loader = document.getElementById("loader");
    const loaderText = document.getElementById("loaderText");
    const loaderBar = document.getElementById("loaderBar");
    const result = document.getElementById("result");
    const errorBox = document.getElementById("errorBox");
    const situationInput = document.getElementById("situation");
    const voiceButton = document.getElementById("voiceButton");
    const voiceStatus = document.getElementById("voiceStatus");
    const clearPromptButton = document.getElementById("clearPromptButton");
    const historyList = document.getElementById("historyList");
    const historyCount = document.getElementById("historyCount");
    const clearHistoryButton = document.getElementById("clearHistoryButton");
    const storageKey = "english-poem-generator-history";
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    const loadingSteps = [
      "Reading the emotional weather...",
      "Choosing images with sharper edges...",
      "Finding the first honest line...",
      "Shaping the rhythm...",
      "Polishing the final stanza..."
    ];

    let loadingTimer = null;
    let currentDraft = null;
    let lastRequest = null;
    let voiceRecognition = null;
    let isListening = false;
    let voiceStopMessage = "";

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function switchView(view) {
      const showCreate = view === "create";
      createView.classList.toggle("hidden", !showCreate);
      historyView.classList.toggle("hidden", showCreate);
      if (!showCreate) renderHistory();
    }

    function getHistory() {
      return JSON.parse(localStorage.getItem(storageKey) || "[]");
    }

    function saveHistory(items) {
      localStorage.setItem(storageKey, JSON.stringify(items));
    }

    function addPoemToHistory(poem) {
      const items = getHistory();
      items.unshift(poem);
      saveHistory(items);
    }

    function findPoemById(id) {
      if (currentDraft && currentDraft.id === id) return currentDraft;
      return getHistory().find((item) => item.id === id);
    }

    function updateVoiceControls(message) {
      voiceButton.textContent = isListening ? "Stop VTT" : "Start VTT";
      voiceButton.classList.toggle("is-listening", isListening);
      voiceStatus.textContent = message || (isListening ? "Listening. Speak naturally and pause when finished." : "Type your prompt, or use voice-to-text.");
    }

    function appendPromptText(text) {
      const cleanText = text.trim();
      if (!cleanText) return;

      const currentValue = situationInput.value.trimEnd();
      situationInput.value = currentValue ? `${currentValue} ${cleanText}` : cleanText;
      situationInput.focus();
    }

    function setupVoiceRecognition() {
      if (!SpeechRecognition) {
        voiceButton.disabled = true;
        voiceStatus.textContent = "Voice-to-text is not supported in this browser.";
        return;
      }

      voiceRecognition = new SpeechRecognition();
      voiceRecognition.lang = "en-US";
      voiceRecognition.continuous = true;
      voiceRecognition.interimResults = true;

      voiceRecognition.addEventListener("result", (event) => {
        let finalText = "";
        let interimText = "";

        for (let index = event.resultIndex; index < event.results.length; index += 1) {
          const transcript = event.results[index][0].transcript;
          if (event.results[index].isFinal) {
            finalText += transcript;
          } else {
            interimText += transcript;
          }
        }

        appendPromptText(finalText);
        if (interimText.trim()) {
          voiceStatus.textContent = `Listening: ${interimText.trim()}`;
        }
      });

      voiceRecognition.addEventListener("end", () => {
        isListening = false;
        updateVoiceControls(voiceStopMessage || "Voice-to-text stopped. You can edit the prompt before generating.");
        voiceStopMessage = "";
      });

      voiceRecognition.addEventListener("error", (event) => {
        isListening = false;
        voiceStopMessage = `Voice-to-text stopped: ${event.error || "microphone access was unavailable"}.`;
        updateVoiceControls(voiceStopMessage);
      });
    }

    function toggleVoiceRecognition() {
      if (!voiceRecognition) return;

      if (isListening) {
        voiceStopMessage = "Voice-to-text stopped. You can edit the prompt before generating.";
        voiceRecognition.stop();
        return;
      }

      isListening = true;
      voiceStopMessage = "";
      updateVoiceControls();
      try {
        voiceRecognition.start();
      } catch (error) {
        isListening = false;
        updateVoiceControls("Voice-to-text could not start. Please try again.");
      }
    }

    function getFormData() {
      return {
        situation: situationInput.value.trim(),
        emotion: document.getElementById("emotion").value,
        style: document.getElementById("style").value,
        poemLength: document.getElementById("poemLength").value,
        tone: document.getElementById("tone").value,
        authorName: document.getElementById("authorName").value.trim() || "Anonymous"
      };
    }

    function renderPoem(poem, options = {}) {
      const editable = options.editable !== false;
      const saved = Boolean(options.saved);
      const poemBody = editable
        ? `<textarea class="poem-editor" id="draftPoemText">${escapeHtml(poem.poem)}</textarea>`
        : `<div class="poem">${escapeHtml(poem.poem)}</div>`;

      return `
        <article class="result">
          <div class="result-header">
            <h2>${escapeHtml(poem.title)}</h2>
            <button class="secondary copy-button" type="button" data-copy-poem="${escapeHtml(poem.id)}">Copy Poem</button>
          </div>
          <div class="byline">By ${escapeHtml(poem.authorName || "Anonymous")}</div>
          <div class="meta">Emotion: ${escapeHtml(poem.emotion)} | Style: ${escapeHtml(poem.style)} | Length: ${escapeHtml(poem.poemLength || "Medium")} | Tone: ${escapeHtml(poem.tone || "Soft")}</div>
          ${poemBody}
          <div class="result-actions">
            <button class="secondary" type="button" data-save-draft="${escapeHtml(poem.id)}" ${saved ? "disabled" : ""}>${saved ? "Saved" : "Save to History"}</button>
            <button class="secondary" type="button" data-regenerate="true">Regenerate</button>
            <button class="secondary" type="button" data-download-image="${escapeHtml(poem.id)}">Export Image</button>
            <button class="secondary" type="button" data-share-poem="${escapeHtml(poem.id)}">Share Link</button>
          </div>
        </article>
      `;
    }

    function renderHistory() {
      const items = getHistory();
      historyCount.textContent = items.length ? `${items.length} saved poem${items.length === 1 ? "" : "s"}` : "No saved poems yet.";
      clearHistoryButton.disabled = items.length === 0;

      historyList.innerHTML = items.map((item) => `
        <article class="history-item">
          <div class="history-title-row">
            <button class="history-title" type="button" data-toggle-id="${escapeHtml(item.id)}">${escapeHtml(item.title)}</button>
            <button class="secondary copy-button" type="button" data-copy-poem="${escapeHtml(item.id)}">Copy Poem</button>
          </div>
          <div class="history-detail hidden" id="history-detail-${escapeHtml(item.id)}">
            <div class="byline">By ${escapeHtml(item.authorName || "Anonymous")}</div>
            <div class="meta">${escapeHtml(item.createdAt)} | Emotion: ${escapeHtml(item.emotion)} | Style: ${escapeHtml(item.style)} | Length: ${escapeHtml(item.poemLength || "Medium")} | Tone: ${escapeHtml(item.tone || "Soft")}</div>
            <div class="prompt-label">Prompt</div>
            <div class="prompt-text">${escapeHtml(item.situation || "")}</div>
            <div class="poem">${escapeHtml(item.poem)}</div>
            <div class="result-actions">
              <button class="secondary" type="button" data-download-image="${escapeHtml(item.id)}">Export Image</button>
              <button class="secondary" type="button" data-share-poem="${escapeHtml(item.id)}">Share Link</button>
            </div>
            <button class="secondary" type="button" data-delete-id="${escapeHtml(item.id)}">Delete This Poem</button>
          </div>
        </article>
      `).join("");
    }

    async function copyPoemById(id) {
      const poem = findPoemById(id);
      if (!poem) return;
      syncDraftFromEditor();

      const text = `Prompt:\n${poem.situation || ""}\n\n${poem.title}\nBy ${poem.authorName || "Anonymous"}\n\n${poem.poem}`;
      await navigator.clipboard.writeText(text);
    }

    function encodeShareData(poem) {
      const json = JSON.stringify(poem);
      const bytes = new TextEncoder().encode(json);
      let binary = "";
      bytes.forEach((byte) => {
        binary += String.fromCharCode(byte);
      });
      return btoa(binary).replaceAll("+", "-").replaceAll("/", "_").replaceAll("=", "");
    }

    function decodeShareData(value) {
      const normalized = value.replaceAll("-", "+").replaceAll("_", "/");
      const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "=");
      const binary = atob(padded);
      const bytes = Uint8Array.from(binary, (character) => character.charCodeAt(0));
      return JSON.parse(new TextDecoder().decode(bytes));
    }

    function createShareLink(poem) {
      syncDraftFromEditor();
      const url = new URL(window.location.href);
      url.hash = `poem=${encodeShareData(poem)}`;
      return url.toString();
    }

    function syncDraftFromEditor() {
      const editor = document.getElementById("draftPoemText");
      if (currentDraft && editor) {
        currentDraft.poem = editor.value.trim();
      }
    }

    function saveDraftToHistory() {
      if (!currentDraft) return;
      syncDraftFromEditor();
      const savedPoem = {
        ...currentDraft,
        createdAt: currentDraft.createdAt || new Date().toLocaleString()
      };
      addPoemToHistory(savedPoem);
      currentDraft = savedPoem;
      result.innerHTML = renderPoem(currentDraft, { editable: false, saved: true });
    }

    function wrapCanvasText(context, text, x, y, maxWidth, lineHeight) {
      const lines = String(text || "").split("\n");
      let currentY = y;

      lines.forEach((line) => {
        const words = line.split(" ");
        let currentLine = "";

        words.forEach((word) => {
          const testLine = currentLine ? `${currentLine} ${word}` : word;
          if (context.measureText(testLine).width > maxWidth && currentLine) {
            context.fillText(currentLine, x, currentY);
            currentLine = word;
            currentY += lineHeight;
          } else {
            currentLine = testLine;
          }
        });

        context.fillText(currentLine, x, currentY);
        currentY += lineHeight;
      });

      return currentY;
    }

    function downloadPoemImage(id) {
      const poem = findPoemById(id);
      if (!poem) return;
      syncDraftFromEditor();

      const canvas = document.createElement("canvas");
      canvas.width = 1400;
      canvas.height = 1800;
      const context = canvas.getContext("2d");
      context.fillStyle = "#0b0c10";
      context.fillRect(0, 0, canvas.width, canvas.height);
      context.fillStyle = "#14161c";
      context.fillRect(90, 90, 1220, 1620);
      context.strokeStyle = "#d7b56d";
      context.lineWidth = 6;
      context.strokeRect(110, 110, 1180, 1580);

      context.fillStyle = "#f7f3ea";
      context.font = "700 64px Georgia, serif";
      let y = wrapCanvasText(context, poem.title, 170, 230, 1060, 76);

      context.fillStyle = "#d7b56d";
      context.font = "500 34px Georgia, serif";
      context.fillText(`By ${poem.authorName || "Anonymous"}`, 170, y + 28);
      y += 92;

      context.fillStyle = "#b8b3aa";
      context.font = "28px Arial, sans-serif";
      context.fillText(`${poem.emotion} | ${poem.style} | ${poem.poemLength || "Medium"} | ${poem.tone || "Soft"}`, 170, y);
      y += 76;

      context.fillStyle = "#f8f0df";
      context.font = "38px Georgia, serif";
      wrapCanvasText(context, poem.poem, 170, y, 1060, 58);

      const link = document.createElement("a");
      link.download = `${(poem.title || "poem").slice(0, 40).replace(/[^a-z0-9]+/gi, "-")}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    async function generatePoem(requestData) {
      const response = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(requestData)
      });

      let data = {};
      const responseText = await response.text();
      try {
        data = responseText ? JSON.parse(responseText) : {};
      } catch {
        data = { error: responseText };
      }

      if (!response.ok) {
        throw new Error(data.error || `Generation failed with HTTP ${response.status}.`);
      }

      return {
        id: crypto.randomUUID(),
        title: data.title || "Untitled Poem",
        poem: data.poem || "",
        ...requestData,
        createdAt: new Date().toLocaleString()
      };
    }

    function startLoading() {
      let progress = 12;
      let step = 0;
      loader.style.display = "block";
      loaderText.textContent = loadingSteps[0];
      loaderBar.style.width = `${progress}%`;

      loadingTimer = setInterval(() => {
        step += 1;
        progress = Math.min(progress + 4, 92);
        loaderText.textContent = loadingSteps[step % loadingSteps.length];
        loaderBar.style.width = `${progress}%`;
      }, 900);
    }

    function stopLoading() {
      clearInterval(loadingTimer);
      loadingTimer = null;
      loader.style.display = "none";
      loaderBar.style.width = "0%";
    }

    setupVoiceRecognition();

    historyButton.addEventListener("click", () => switchView("history"));
    backButton.addEventListener("click", () => switchView("create"));
    voiceButton.addEventListener("click", toggleVoiceRecognition);
    clearPromptButton.addEventListener("click", () => {
      if (isListening && voiceRecognition) {
        voiceStopMessage = "Prompt cleared. Type a new prompt, or start voice-to-text.";
        voiceRecognition.stop();
      }
      situationInput.value = "";
      situationInput.focus();
      updateVoiceControls("Prompt cleared. Type a new prompt, or start voice-to-text.");
    });

    clearHistoryButton.addEventListener("click", () => {
      saveHistory([]);
      renderHistory();
    });

    historyList.addEventListener("click", (event) => {
      const toggleButton = event.target.closest("[data-toggle-id]");
      if (toggleButton) {
        const id = toggleButton.getAttribute("data-toggle-id");
        const detail = document.getElementById(`history-detail-${id}`);
        if (detail) detail.classList.toggle("hidden");
        return;
      }

      const copyButton = event.target.closest("[data-copy-poem]");
      if (copyButton) {
        copyPoemById(copyButton.getAttribute("data-copy-poem"));
        copyButton.textContent = "Copied";
        setTimeout(() => {
          copyButton.textContent = "Copy Poem";
        }, 1200);
        return;
      }

      const downloadButton = event.target.closest("[data-download-image]");
      if (downloadButton) {
        downloadPoemImage(downloadButton.getAttribute("data-download-image"));
        return;
      }

      const shareButton = event.target.closest("[data-share-poem]");
      if (shareButton) {
        const poem = findPoemById(shareButton.getAttribute("data-share-poem"));
        if (!poem) return;
        navigator.clipboard.writeText(createShareLink(poem));
        shareButton.textContent = "Link Copied";
        setTimeout(() => {
          shareButton.textContent = "Share Link";
        }, 1200);
        return;
      }

      const deleteButton = event.target.closest("[data-delete-id]");
      if (!deleteButton) return;
      const id = deleteButton.getAttribute("data-delete-id");
      saveHistory(getHistory().filter((item) => item.id !== id));
      renderHistory();
    });

    poemForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorBox.innerHTML = "";

      const requestData = getFormData();

      if (!requestData.situation) {
        errorBox.innerHTML = '<div class="error">Please enter a situation or emotional prompt.</div>';
        return;
      }

      lastRequest = requestData;
      generateButton.disabled = true;
      result.innerHTML = "";
      startLoading();

      try {
        currentDraft = await generatePoem(requestData);
        result.innerHTML = renderPoem(currentDraft);
      } catch (error) {
        errorBox.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
      } finally {
        stopLoading();
        generateButton.disabled = false;
      }
    });

    result.addEventListener("click", (event) => {
      const copyButton = event.target.closest("[data-copy-poem]");
      if (copyButton) {
        copyPoemById(copyButton.getAttribute("data-copy-poem"));
        copyButton.textContent = "Copied";
        setTimeout(() => {
          copyButton.textContent = "Copy Poem";
        }, 1200);
        return;
      }

      const saveButton = event.target.closest("[data-save-draft]");
      if (saveButton) {
        saveDraftToHistory();
        return;
      }

      const regenerateButton = event.target.closest("[data-regenerate]");
      if (regenerateButton && lastRequest) {
        errorBox.innerHTML = "";
        result.innerHTML = "";
        startLoading();

        generatePoem(lastRequest)
          .then((poem) => {
            currentDraft = poem;
            result.innerHTML = renderPoem(currentDraft);
          })
          .catch((error) => {
            errorBox.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
          })
          .finally(() => stopLoading());
        return;
      }

      const downloadButton = event.target.closest("[data-download-image]");
      if (downloadButton) {
        downloadPoemImage(downloadButton.getAttribute("data-download-image"));
        return;
      }

      const shareButton = event.target.closest("[data-share-poem]");
      if (shareButton) {
        const poem = findPoemById(shareButton.getAttribute("data-share-poem"));
        if (!poem) return;
        navigator.clipboard.writeText(createShareLink(poem));
        shareButton.textContent = "Link Copied";
        setTimeout(() => {
          shareButton.textContent = "Share Link";
        }, 1200);
      }
    });

    function loadSharedPoem() {
      if (!window.location.hash.startsWith("#poem=")) return;

      try {
        currentDraft = decodeShareData(window.location.hash.slice(6));
        lastRequest = {
          situation: currentDraft.situation || "",
          emotion: currentDraft.emotion || "Love",
          style: currentDraft.style || "Simple English",
          poemLength: currentDraft.poemLength || "Medium",
          tone: currentDraft.tone || "Soft",
          authorName: currentDraft.authorName || "Anonymous"
        };
        result.innerHTML = renderPoem(currentDraft);
      } catch {
        errorBox.innerHTML = '<div class="error">This shared poem link could not be opened.</div>';
      }
    }

    loadSharedPoem();
  </script>
</body>
</html>
